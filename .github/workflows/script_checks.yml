name: 🤹 Script checks

on:
  push:
    branches:
      - master
      - release-**
  pull_request:
  release:
    types: ['published', 'released']

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check version number
        run: |
          ./test/test_version_number.sh
